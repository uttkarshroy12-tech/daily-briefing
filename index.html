<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-meta" id="header-date"></div>
      <h1 class="header-title">Daily Brief</h1>
      <div class="header-rule"></div>
      <p class="header-sub">A concise overview of the most important business and market updates</p>
    </div>
    <div class="tabs-outer">
      <nav class="tabs-nav" id="tabs-nav">
        <button class="tab active" data-cat="India Macro &amp; Policy">India Macro &amp; Policy</button>
        <button class="tab" data-cat="India Markets &amp; Corporate">India Markets &amp; Corporate</button>
        <button class="tab" data-cat="India Startups &amp; VC">India Startups &amp; VC</button>
        <button class="tab" data-cat="Global Macro &amp; Central Banks">Global Macro &amp; Central Banks</button>
        <button class="tab" data-cat="Global Markets &amp; Business">Global Markets &amp; Business</button>
        <button class="tab" data-cat="Strategy &amp; Deep Analysis">Strategy &amp; Deep Analysis</button>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <p class="sidebar-label">Sources</p>
      <ul class="source-list" id="source-list"></ul>
      <div class="sidebar-section">
        <p class="sidebar-label" style="margin-top:24px">Archive</p>
        <ul class="archive-list" id="archive-list"></ul>
      </div>
    </aside>

    <main class="main-content">
      <div class="content-header">
        <h2 class="category-title" id="active-category-title">India Macro &amp; Policy</h2>
        <button class="refresh-btn" id="refresh-btn" onclick="loadToday()">
          <span class="refresh-icon">↻</span> Refresh
        </button>
      </div>
      <div class="divider"></div>
      <div id="articles-container">
        <div class="loading-state"></div>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    <p>Daily Brief · Powered by Groq + Llama 3 · Updates every day at 7 AM IST</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
