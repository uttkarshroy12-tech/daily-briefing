name: Daily News Scrape

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper/scrape.py

      - name: Commit and push data
        run: |
          git config --global user.name "Daily Briefing Bot"
          git config --global user.email "bot@dailybriefing.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily briefing update $(date +'%Y-%m-%d')"
          git push
